<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Chat</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=DM+Mono:ital,wght@0,300;0,400;1,300&family=DM+Sans:wght@300;400;500&display=swap" rel="stylesheet">
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --bg: #0e0e0f;
      --surface: #18181b;
      --border: #2a2a2e;
      --accent: #e8ff6b;
      --accent-dim: rgba(232,255,107,0.12);
      --text: #e8e8e2;
      --muted: #6b6b72;
      --user-bg: #1e1e24;
      --ai-bg: #131316;
      --radius: 14px;
    }

    html, body {
      height: 100%;
      background: var(--bg);
      color: var(--text);
      font-family: 'DM Sans', sans-serif;
      font-weight: 300;
    }

    body {
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      min-height: 100vh;
      padding: 16px;
    }

    /* Subtle noise texture */
    body::before {
      content: '';
      position: fixed;
      inset: 0;
      background-image: url("data:image/svg+xml,%3Csvg viewBox='0 0 200 200' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='n'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.9' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23n)' opacity='0.03'/%3E%3C/svg%3E");
      pointer-events: none;
      z-index: 0;
      opacity: 0.4;
    }

    .shell {
      position: relative;
      z-index: 1;
      width: 100%;
      max-width: 680px;
      height: min(680px, 90vh);
      display: flex;
      flex-direction: column;
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 20px;
      overflow: hidden;
      box-shadow: 0 0 0 1px rgba(255,255,255,0.03), 0 32px 80px rgba(0,0,0,0.5);
    }

    /* Header */
    .header {
      display: flex;
      align-items: center;
      gap: 10px;
      padding: 16px 20px;
      border-bottom: 1px solid var(--border);
      flex-shrink: 0;
    }

    .dot {
      width: 8px; height: 8px;
      border-radius: 50%;
      background: var(--accent);
      box-shadow: 0 0 8px var(--accent);
      animation: pulse 2.4s ease-in-out infinite;
    }

    @keyframes pulse {
      0%, 100% { opacity: 1; transform: scale(1); }
      50% { opacity: 0.5; transform: scale(0.85); }
    }

    .header-title {
      font-family: 'DM Mono', monospace;
      font-size: 13px;
      font-weight: 400;
      color: var(--muted);
      letter-spacing: 0.08em;
      text-transform: uppercase;
    }

    /* Messages */
    #messages {
      flex: 1;
      overflow-y: auto;
      padding: 24px 20px;
      display: flex;
      flex-direction: column;
      gap: 16px;
      scrollbar-width: thin;
      scrollbar-color: var(--border) transparent;
    }

    #messages::-webkit-scrollbar { width: 4px; }
    #messages::-webkit-scrollbar-track { background: transparent; }
    #messages::-webkit-scrollbar-thumb { background: var(--border); border-radius: 4px; }

    .msg {
      display: flex;
      flex-direction: column;
      max-width: 88%;
      animation: rise 0.25s ease;
    }

    @keyframes rise {
      from { opacity: 0; transform: translateY(8px); }
      to   { opacity: 1; transform: translateY(0); }
    }

    .msg.user { align-self: flex-end; align-items: flex-end; }
    .msg.ai   { align-self: flex-start; align-items: flex-start; }

    .label {
      font-family: 'DM Mono', monospace;
      font-size: 10px;
      color: var(--muted);
      letter-spacing: 0.1em;
      text-transform: uppercase;
      margin-bottom: 5px;
      padding: 0 4px;
    }

    .msg.user .label { color: var(--accent); opacity: 0.7; }

    .bubble {
      padding: 11px 15px;
      border-radius: var(--radius);
      line-height: 1.65;
      font-size: 14.5px;
      word-break: break-word;
      white-space: pre-wrap;
    }

    .msg.user .bubble {
      background: var(--user-bg);
      border: 1px solid rgba(232,255,107,0.15);
      border-bottom-right-radius: 4px;
      color: var(--text);
    }

    .msg.ai .bubble {
      background: var(--ai-bg);
      border: 1px solid var(--border);
      border-bottom-left-radius: 4px;
      color: #c8c8c2;
    }

    /* Typing indicator */
    .typing .bubble {
      display: flex;
      align-items: center;
      gap: 5px;
      padding: 14px 18px;
    }

    .typing .bubble span {
      width: 5px; height: 5px;
      border-radius: 50%;
      background: var(--muted);
      animation: blink 1.2s ease-in-out infinite;
    }

    .typing .bubble span:nth-child(2) { animation-delay: 0.2s; }
    .typing .bubble span:nth-child(3) { animation-delay: 0.4s; }

    @keyframes blink {
      0%, 80%, 100% { opacity: 0.2; transform: scale(0.8); }
      40% { opacity: 1; transform: scale(1); }
    }

    /* Empty state */
    .empty {
      flex: 1;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      gap: 10px;
      color: var(--muted);
      user-select: none;
    }

    .empty-icon {
      font-size: 32px;
      opacity: 0.3;
    }

    .empty p {
      font-family: 'DM Mono', monospace;
      font-size: 12px;
      letter-spacing: 0.06em;
    }

    /* Input area */
    .input-area {
      padding: 14px 16px;
      border-top: 1px solid var(--border);
      display: flex;
      gap: 10px;
      align-items: flex-end;
      flex-shrink: 0;
      background: rgba(14,14,15,0.6);
      backdrop-filter: blur(8px);
    }

    #input {
      flex: 1;
      background: var(--bg);
      border: 1px solid var(--border);
      border-radius: 10px;
      padding: 10px 14px;
      color: var(--text);
      font-family: 'DM Sans', sans-serif;
      font-size: 14px;
      font-weight: 300;
      resize: none;
      outline: none;
      line-height: 1.5;
      max-height: 120px;
      min-height: 42px;
      transition: border-color 0.2s;
    }

    #input::placeholder { color: var(--muted); }
    #input:focus { border-color: rgba(232,255,107,0.3); }

    #send {
      flex-shrink: 0;
      width: 42px; height: 42px;
      border-radius: 10px;
      background: var(--accent);
      border: none;
      cursor: pointer;
      display: flex;
      align-items: center;
      justify-content: center;
      transition: opacity 0.15s, transform 0.15s;
      color: #0e0e0f;
    }

    #send:hover { opacity: 0.88; transform: scale(1.04); }
    #send:active { transform: scale(0.97); }
    #send:disabled { opacity: 0.3; cursor: not-allowed; transform: none; }

    #send svg { width: 18px; height: 18px; }
  </style>
</head>
<body>
  <div class="shell">
    <div class="header">
      <div class="dot"></div>
      <span class="header-title">Assistant</span>
    </div>

    <div id="messages">
      <div class="empty" id="empty">
        <div class="empty-icon">◎</div>
        <p>Start a conversation</p>
      </div>
    </div>

    <div class="input-area">
      <textarea id="input" rows="1" placeholder="Message…" maxlength="4000"></textarea>
      <button id="send" title="Send">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.2" stroke-linecap="round" stroke-linejoin="round">
          <line x1="22" y1="2" x2="11" y2="13"></line>
          <polygon points="22 2 15 22 11 13 2 9 22 2"></polygon>
        </svg>
      </button>
    </div>
  </div>

  <script>
    const messagesEl = document.getElementById('messages');
    const inputEl    = document.getElementById('input');
    const sendBtn    = document.getElementById('send');
    const emptyEl    = document.getElementById('empty');

    const history = []; // [{role, content}]

    function addMessage(role, text) {
      if (emptyEl) emptyEl.remove();
      const wrap = document.createElement('div');
      wrap.className = `msg ${role}`;
      const label = document.createElement('div');
      label.className = 'label';
      label.textContent = role === 'user' ? 'You' : 'Assistant';
      const bubble = document.createElement('div');
      bubble.className = 'bubble';
      bubble.textContent = text;
      wrap.appendChild(label);
      wrap.appendChild(bubble);
      messagesEl.appendChild(wrap);
      messagesEl.scrollTop = messagesEl.scrollHeight;
      return bubble;
    }

    function showTyping() {
      if (emptyEl) emptyEl.remove();
      const wrap = document.createElement('div');
      wrap.className = 'msg ai typing';
      wrap.id = 'typing';
      const label = document.createElement('div');
      label.className = 'label';
      label.textContent = 'Assistant';
      const bubble = document.createElement('div');
      bubble.className = 'bubble';
      for (let i = 0; i < 3; i++) {
        const s = document.createElement('span');
        bubble.appendChild(s);
      }
      wrap.appendChild(label);
      wrap.appendChild(bubble);
      messagesEl.appendChild(wrap);
      messagesEl.scrollTop = messagesEl.scrollHeight;
    }

    function removeTyping() {
      const el = document.getElementById('typing');
      if (el) el.remove();
    }

    async function send() {
      const text = inputEl.value.trim();
      if (!text) return;

      inputEl.value = '';
      inputEl.style.height = 'auto';
      sendBtn.disabled = true;

      addMessage('user', text);
      history.push({ role: 'user', content: text });
      showTyping();

      try {
        const res = await fetch('/api/chat', {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ history })
        });

        removeTyping();

        if (!res.ok) {
          const err = await res.text();
          addMessage('ai', 'Error: ' + err);
          return;
        }

        const { reply } = await res.json();
        addMessage('ai', reply);
        history.push({ role: 'model', content: reply });
      } catch (e) {
        removeTyping();
        addMessage('ai', 'Something went wrong. Please try again.');
      } finally {
        sendBtn.disabled = false;
        inputEl.focus();
      }
    }

    // Auto-grow textarea
    inputEl.addEventListener('input', () => {
      inputEl.style.height = 'auto';
      inputEl.style.height = Math.min(inputEl.scrollHeight, 120) + 'px';
    });

    // Send on Enter (Shift+Enter for newline)
    inputEl.addEventListener('keydown', e => {
      if (e.key === 'Enter' && !e.shiftKey) {
        e.preventDefault();
        send();
      }
    });

    sendBtn.addEventListener('click', send);
    inputEl.focus();
  </script>
</body>
</html>
