<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>AI Chatbot</title>
  <style>
    body { background: #121212; color: #fff; font-family: sans-serif; display: flex; justify-content: center; align-items: center; height: 100vh; }
    #chat-container { width: 400px; }
    #chat-box { border: 1px solid #444; height: 300px; overflow-y: auto; padding: 10px; margin-bottom: 10px; }
    #chat-input { width: 70%; padding: 5px; }
    #send-btn { width: 25%; padding: 5px; }
    p { margin: 5px 0; }
    b { color: #00f; }
  </style>
</head>
<body>
  <div id="chat-container">
    <div id="chat-box"></div>
    <input id="chat-input" placeholder="Say something..." />
    <button id="send-btn">Send</button>
  </div>

  <script>
    const chatBox = document.getElementById("chat-box");
    const input = document.getElementById("chat-input");
    const btn = document.getElementById("send-btn");

    btn.addEventListener("click", async () => {
      const userMessage = input.value.trim();
      if (!userMessage) return;

      chatBox.innerHTML += `<p><b>You:</b> ${userMessage}</p>`;
      input.value = "";

      chatBox.innerHTML += `<p><i>Bot is typing...</i></p>`;
      chatBox.scrollTop = chatBox.scrollHeight;

      try {
        const res = await fetch("/api/chat", {
          method: "POST",
          headers: { "Content-Type": "application/json" },
          body: JSON.stringify({ message: userMessage }),
        });
        const data = await res.json();

        chatBox.querySelector("p:last-child").remove(); // remove "typing"
        chatBox.innerHTML += `<p><b>Bot:</b> ${data.reply}</p>`;
        chatBox.scrollTop = chatBox.scrollHeight;
      } catch (err) {
        chatBox.innerHTML += `<p><b>Bot:</b> Error sending message.</p>`;
      }
    });
  </script>
</body>
</html>
